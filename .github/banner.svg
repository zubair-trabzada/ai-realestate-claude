<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320">
      <stop offset="0%" stop-color="#0c1220"/>
      <stop offset="100%" stop-color="#1a2840"/>
    </linearGradient>
    <linearGradient id="goldLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d4a244"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="12" fill="url(#bg)"/>

  <!-- Left column: Title + info -->

  <!-- Gold accent bar -->
  <rect x="45" y="35" width="4" height="70" rx="2" fill="#d4a244"/>

  <!-- Main title -->
  <text x="62" y="68" font-family="monospace, 'Courier New'" font-size="40" font-weight="bold" fill="#d4a244" letter-spacing="2">AI REAL ESTATE</text>
  <text x="62" y="100" font-family="monospace, 'Courier New'" font-size="22" fill="#5b9a6a" letter-spacing="4">ANALYST</text>

  <!-- Divider -->
  <rect x="62" y="115" width="200" height="2" rx="1" fill="url(#goldLine)" opacity="0.5"/>

  <!-- Tagline -->
  <text x="62" y="140" font-family="monospace, 'Courier New'" font-size="12" fill="#7a8a9e">Property Research &amp; Investment Analysis</text>
  <text x="62" y="158" font-family="monospace, 'Courier New'" font-size="12" fill="#7a8a9e">for Claude Code</text>

  <!-- Stats row -->
  <g font-family="monospace, 'Courier New'" font-size="11" font-weight="bold">
    <rect x="62" y="175" width="75" height="24" rx="4" fill="#1a2535" stroke="#d4a244" stroke-width="1"/>
    <text x="99" y="191" fill="#d4a244" text-anchor="middle">15 Skills</text>

    <rect x="147" y="175" width="75" height="24" rx="4" fill="#1a2535" stroke="#d4a244" stroke-width="1"/>
    <text x="184" y="191" fill="#d4a244" text-anchor="middle">5 Agents</text>

    <rect x="232" y="175" width="95" height="24" rx="4" fill="#1a2535" stroke="#5b9a6a" stroke-width="1"/>
    <text x="279" y="191" fill="#5b9a6a" text-anchor="middle">PDF Reports</text>
  </g>

  <!-- Right column: Feature list -->
  <g font-family="monospace, 'Courier New'" font-size="12">
    <text x="470" y="55" fill="#d4a244">⬡</text><text x="490" y="55" fill="#c8d0dc">Comparable Sales Analysis</text>
    <text x="470" y="80" fill="#d4a244">⬡</text><text x="490" y="80" fill="#c8d0dc">Rental Income &amp; Cash Flow</text>
    <text x="470" y="105" fill="#d4a244">⬡</text><text x="490" y="105" fill="#c8d0dc">BRRRR &amp; Fix-and-Flip</text>
    <text x="470" y="130" fill="#d4a244">⬡</text><text x="490" y="130" fill="#c8d0dc">Neighborhood &amp; Schools</text>
    <text x="470" y="155" fill="#d4a244">⬡</text><text x="490" y="155" fill="#c8d0dc">Commercial &amp; Mortgage</text>
    <text x="470" y="180" fill="#d4a244">⬡</text><text x="490" y="180" fill="#c8d0dc">Market Conditions &amp; Trends</text>
  </g>

  <!-- Vertical divider between columns -->
  <line x1="440" y1="40" x2="440" y2="200" stroke="#2a3650" stroke-width="1"/>

  <!-- Commands section (full width, bottom area) -->
  <rect x="0" y="215" width="900" height="1" fill="#2a3650" opacity="0.6"/>

  <g font-family="monospace, 'Courier New'" font-size="12">
    <text x="62" y="245">
      <tspan fill="#5b9a6a">/realestate analyze</tspan><tspan fill="#4e5d73"> full property audit</tspan>
    </text>
    <text x="340" y="245">
      <tspan fill="#5b9a6a">/realestate invest</tspan><tspan fill="#4e5d73"> ROI &amp; BRRRR</tspan>
    </text>
    <text x="590" y="245">
      <tspan fill="#5b9a6a">/realestate rental</tspan><tspan fill="#4e5d73"> cash flow</tspan>
    </text>
    <text x="62" y="270">
      <tspan fill="#5b9a6a">/realestate comps</tspan><tspan fill="#4e5d73"> market value</tspan>
    </text>
    <text x="340" y="270">
      <tspan fill="#5b9a6a">/realestate listing</tspan><tspan fill="#4e5d73"> MLS description</tspan>
    </text>
    <text x="590" y="270">
      <tspan fill="#5b9a6a">/realestate report-pdf</tspan><tspan fill="#4e5d73"> PDF</tspan>
    </text>
  </g>

  <!-- Bottom bar -->
  <rect x="0" y="290" width="900" height="30" rx="0" fill="#080e18"/>
  <text x="450" y="310" font-family="monospace, 'Courier New'" font-size="11" fill="#3d4d63" text-anchor="middle" letter-spacing="1">
    residential  ·  commercial  ·  multi-family  ·  fix &amp; flip  ·  short-term rental  ·  land  ·  for Claude Code
  </text>
</svg>
