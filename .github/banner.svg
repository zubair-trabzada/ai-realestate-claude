<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="900" y2="320">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d8a4e"/>
      <stop offset="100%" stop-color="#e8a838"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="320" rx="12" fill="url(#bg)"/>

  <!-- Top accent line -->
  <rect x="40" y="40" width="120" height="4" rx="2" fill="url(#accent)"/>

  <!-- Main title -->
  <text x="40" y="105" font-family="monospace, 'Courier New'" font-size="62" font-weight="bold" fill="#e8a838" letter-spacing="6">AI REAL ESTATE</text>

  <!-- Subtitle -->
  <text x="40" y="140" font-family="monospace, 'Courier New'" font-size="20" fill="#2d8a4e" letter-spacing="2">ANALYST</text>

  <!-- Tagline -->
  <text x="40" y="172" font-family="monospace, 'Courier New'" font-size="15" fill="#6b7b8d">AI-Powered Property Research &amp; Investment Analysis for Claude Code</text>

  <!-- Stat badges row -->
  <!-- Badge: 15 Skills -->
  <rect x="40" y="195" width="105" height="28" rx="6" fill="#0d1117" stroke="#2d8a4e" stroke-width="1"/>
  <text x="92" y="214" font-family="monospace, 'Courier New'" font-size="12" fill="#e8a838" text-anchor="middle" font-weight="bold">15 Skills</text>

  <!-- Badge: 5 Agents -->
  <rect x="160" y="195" width="100" height="28" rx="6" fill="#0d1117" stroke="#2d8a4e" stroke-width="1"/>
  <text x="210" y="214" font-family="monospace, 'Courier New'" font-size="12" fill="#e8a838" text-anchor="middle" font-weight="bold">5 Agents</text>

  <!-- Badge: Comps -->
  <rect x="275" y="195" width="90" height="28" rx="6" fill="#0d1117" stroke="#2d8a4e" stroke-width="1"/>
  <text x="320" y="214" font-family="monospace, 'Courier New'" font-size="12" fill="#e8a838" text-anchor="middle" font-weight="bold">Comps</text>

  <!-- Badge: Cash Flow -->
  <rect x="380" y="195" width="110" height="28" rx="6" fill="#0d1117" stroke="#2d8a4e" stroke-width="1"/>
  <text x="435" y="214" font-family="monospace, 'Courier New'" font-size="12" fill="#e8a838" text-anchor="middle" font-weight="bold">Cash Flow</text>

  <!-- Badge: BRRRR -->
  <rect x="505" y="195" width="100" height="28" rx="6" fill="#0d1117" stroke="#2d8a4e" stroke-width="1"/>
  <text x="555" y="214" font-family="monospace, 'Courier New'" font-size="12" fill="#e8a838" text-anchor="middle" font-weight="bold">BRRRR</text>

  <!-- Badge: PDF Reports -->
  <rect x="620" y="195" width="120" height="28" rx="6" fill="#0d1117" stroke="#2d8a4e" stroke-width="1"/>
  <text x="680" y="214" font-family="monospace, 'Courier New'" font-size="12" fill="#e8a838" text-anchor="middle" font-weight="bold">PDF Reports</text>

  <!-- Command previews -->
  <text x="40" y="258" font-family="monospace, 'Courier New'" font-size="13">
    <tspan fill="#2d8a4e">/realestate analyze</tspan><tspan fill="#4A5568"> full 5-agent audit</tspan>
  </text>
  <text x="330" y="258" font-family="monospace, 'Courier New'" font-size="13">
    <tspan fill="#2d8a4e">/realestate invest</tspan><tspan fill="#4A5568"> ROI analysis</tspan>
  </text>
  <text x="580" y="258" font-family="monospace, 'Courier New'" font-size="13">
    <tspan fill="#2d8a4e">/realestate report-pdf</tspan><tspan fill="#4A5568"> PDF report</tspan>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="296" width="900" height="24" rx="0" fill="#0A0F1A"/>
  <text x="40" y="313" font-family="monospace, 'Courier New'" font-size="12" fill="#4A5568">
    comps + rental + BRRRR + flip + commercial + mortgage + neighborhood — property analysis in one command
  </text>
</svg>
